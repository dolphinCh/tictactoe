<nav class="nav">
  <div class="nav-left">
    <button class="icon-btn" (click)="menuOpen.update(v => !v)" [attr.aria-expanded]="menuOpen()">
      <span class="hamburger">☰</span>
    </button>

    @if (menuOpen()) {
      <div class="backdrop" (click)="menuOpen.set(false)"></div>
      <div class="dropdown">
        <a class="dropdown-item"
           routerLink="/tictactoe"
           routerLinkActive="active"
           (click)="menuOpen.set(false)">
          Тик-так-тое
        </a>
        <a class="dropdown-item"
           routerLink="/besilka"
           routerLinkActive="active"
           (click)="menuOpen.set(false)">
          Бесилка
        </a>
        <a class="dropdown-item"
           routerLink="/geografija"
           routerLinkActive="active"
           (click)="menuOpen.set(false)">
          Брза географија
        </a>
        <a class="dropdown-item"
           routerLink="/matematika"
           routerLinkActive="active"
           (click)="menuOpen.set(false)">
          Математика
        </a>
        <a class="dropdown-item"
           routerLink="/gatanki"
           routerLinkActive="active"
           (click)="menuOpen.set(false)">
          Гатанки
        </a>
      </div>
    }
  </div>

  <div class="nav-right">
    <button class="icon-btn" (click)="theme.toggle()" [title]="theme.isDark() ? 'Розова тема' : 'Темна тема'">
      {{ theme.isDark() ? '🌸' : '🌙' }}
    </button>
  </div>
</nav>
