<svg viewBox="0 0 200 220" class="hangman" xmlns="http://www.w3.org/2000/svg">
  <!-- Gallows -->
  <line x1="20"  y1="210" x2="100" y2="210" class="line" />
  <line x1="60"  y1="210" x2="60"  y2="15"  class="line" />
  <line x1="60"  y1="15"  x2="148" y2="15"  class="line" />
  <line x1="148" y1="15"  x2="148" y2="42"  class="line" />

  <!-- Head -->
  @if (wrongCount() >= 1) {
    <circle cx="148" cy="58" r="16" class="line" />
  }
  <!-- Body -->
  @if (wrongCount() >= 2) {
    <line x1="148" y1="74"  x2="148" y2="128" class="line" />
  }
  <!-- Left arm -->
  @if (wrongCount() >= 3) {
    <line x1="148" y1="90"  x2="118" y2="112" class="line" />
  }
  <!-- Right arm -->
  @if (wrongCount() >= 4) {
    <line x1="148" y1="90"  x2="178" y2="112" class="line" />
  }
  <!-- Left leg -->
  @if (wrongCount() >= 5) {
    <line x1="148" y1="128" x2="118" y2="163" class="line" />
  }
  <!-- Right leg -->
  @if (wrongCount() >= 6) {
    <line x1="148" y1="128" x2="178" y2="163" class="line" />
  }
</svg>
